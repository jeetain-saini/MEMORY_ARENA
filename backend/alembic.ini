# Alembic configuration — database migrations for MemoryArena.
# Stage 0: configured but no versions exist yet (backend/alembic/versions is empty).
# The sqlalchemy.url is intentionally left blank; it is injected at runtime from
# the DATABASE_URL environment variable inside alembic/env.py (Stage 1).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
