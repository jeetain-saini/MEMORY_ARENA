# Render Blueprint for the MemoryArena backend (free tier, SQLite, no Redis/Neo4j).
# Create from the Render dashboard: New + -> Blueprint -> point at this repo.
# Secrets (sync:false) are entered in the dashboard, not committed.
services:
  - type: web
    name: memoryarena-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    # Liveness probe: /version is always 200 (no Redis/Neo4j/DB probes), unlike
    # /health which reports those backends and would 503 on the free profile.
    healthCheckPath: /api/v1/version
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: staging                       # enables /docs; skips the strict prod validator
      - key: POSTGRES_URL
        value: sqlite+aiosqlite:///./memoryarena.db
      - key: AUTO_CREATE_SCHEMA
        value: "true"                        # SQLite: create schema on boot (Alembic is PG-only)
      - key: SEED_DEMO_ON_STARTUP
        value: "true"                        # idempotent portfolio data
      - key: GRAPH_BACKEND
        value: memory                        # in-memory graph (no Neo4j)
      - key: CACHE_BACKEND
        value: noop
      - key: AUTH_ENABLED
        value: "false"
      - key: RATE_LIMIT_ENABLED
        value: "false"
      - key: MAINTENANCE_ENABLED
        value: "false"
      - key: LLM_PROVIDER
        value: deterministic                 # no API keys
      - key: EMBEDDING_PROVIDER
        value: hash
      - key: WORKFLOW_ENGINE
        value: sequential
      - key: AGENT_RUNTIME
        value: sequential
      - key: CONSOLIDATION_ENGINE
        value: sequential
      - key: TRACE_RECORDER
        value: in_memory
      - key: METRICS_SINK
        value: memory                        # populate /observability/metrics for the demo
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_SECRET
        sync: false                          # set in the dashboard (openssl rand -hex 32)
      - key: CORS_ALLOWED_ORIGINS
        sync: false                          # set to your Vercel URL, e.g. https://memoryarena.vercel.app
