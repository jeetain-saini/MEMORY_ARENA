# Prometheus scrape configuration for MemoryArena (Phase 4 Observability).
# Scrapes the backend's text exposition endpoint and evaluates alert rules.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert.rules.yml

scrape_configs:
  - job_name: memoryarena-backend
    metrics_path: /api/v1/observability/prometheus
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: memoryarena
          component: backend
